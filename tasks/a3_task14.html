<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Leaderboard</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div id="navbar"></div>

<h1>Student Leaderboard</h1>

<div class="layout">

<div class="content">

<table class="leaderboard-table">

    <tr>
        <th>Rank</th>
        <th>Student Name</th>
        <th>Score</th>
        <th>Photo</th>
    </tr>

    <!-- 1st -->
    <tr>
        <td>🥇 1st</td>
        <td class="name">
            Vecna
            <ul class="top-subjects">
                <li>Mathematics</li>
                <li>Physics</li>
                <li>Computer Science</li>
            </ul>
        </td>
        <td>98.00</td>
        <td class="photo-cell">
            <img src="../images/leaderboard/photo/photo1.jpg">
            <img src="../images/leaderboard/medals/medal1.png" class="medal">
        </td>
    </tr>

    <!-- 2nd -->
    <tr>
        <td>🥈 2nd</td>
        <td class="name">
            Demogorgon
            <ul class="top-subjects">
                <li>English</li>
                <li>History</li>
                <li>Political Science</li>
            </ul>
        </td>
        <td>96.00</td>
        <td class="photo-cell">
            <img src="../images/leaderboard/photo/photo2.jpeg">
            <img src="../images/leaderboard/medals/medal2.png" class="medal">
        </td>
    </tr>

    <!-- 3rd -->
    <tr>
        <td>🥉 3rd</td>
        <td class="name">
            Demodog
            <ul class="top-subjects">
                <li>Science</li>
                <li>Mathematics</li>
                <li>Geography</li>
            </ul>
        </td>
        <td>92.00</td>
        <td class="photo-cell">
            <img src="../images/leaderboard/photo/photo3.jpg">
            <img src="../images/leaderboard/medals/medal3.jpg" class="medal">
        </td>
    </tr>

</table>

</div>
</div>

<div class="footer">
    <p>Student Leaderboard</p>
</div>

<script src="../js/components.js"></script>

</body>
</html>
