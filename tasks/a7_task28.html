<!DOCTYPE html>
<html>
<head>
    <title>InnerHTML Example</title>

    <style>
        button {
            cursor: pointer;
        }
    </style>
</head>

<body>

<p id="para">Hello World!</p>

<button onclick="changeText()">Click Me</button>

<script>
    function changeText() {
        document.getElementById("para").innerHTML = "Welcome to JavaScript!";
    }
</script>

</body>
</html>
