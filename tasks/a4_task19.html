<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flex Layout</title>

    <link rel="stylesheet" href="a4_task19.css">
</head>

<body>

<div class="container">

    <h1>Product Display</h1>

    <div class="flex-box">

        <div class="box">
            <img src="../images/products/oneplus.jpeg" alt="Product 1">
            <h3>OnePlus</h3>
            <p>High performance smartphone</p>
        </div>

        <div class="box">
            <img src="../images/products/xiaomi.jpeg" alt="Product 2">
            <h3>Xiaomi</h3>
            <p>Affordable and powerful</p>
        </div>

        <div class="box">
            <img src="../images/products/apple.jpg" alt="Product 3">
            <h3>iPhone</h3>
            <p>Premium Apple experience</p>
        </div>

    </div>

</div>

</body>
</html>
