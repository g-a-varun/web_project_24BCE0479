<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
    <link rel="stylesheet" href="a4_task20.css">
</head>
<body>

    <div class="form">
        <h2>Login</h2>

        <label>Username</label>
        <input type="text">

        <label>Password</label>
        <input type="password">

        <div class="check">
            <input type="checkbox"> Remember me
        </div>

        <button>Login</button>
    </div>

    <div class="form">
        <h2>Register</h2>

        <label>Full Name</label>
        <input type="text">

        <label>Email</label>
        <input type="email">

        <label>Password</label>
        <input type="password">

        <label>Confirm Password</label>
        <input type="password">

        <div class="gender">
            <input type="radio" name="g"> Male
            <input type="radio" name="g"> Female
            <input type="radio" name="g"> Other
        </div>

        <button>Register</button>
    </div>

</body>
</html>
