<!DOCTYPE html>
<html>
<head>
    <title>Image Gallery</title>

    <link rel="stylesheet" href="jquery_tasks.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>

<h2>Simple Image Gallery</h2>

<img id="main" src="https://picsum.photos/id/1015/400/250">

<div>
    <img class="thumb" src="https://picsum.photos/id/1015/100/60">
    <img class="thumb" src="https://picsum.photos/id/1016/100/60">
    <img class="thumb" src="https://picsum.photos/id/1018/100/60">
</div>

<script>
$(document).ready(function(){
    $(".thumb").click(function(){

        let newSrc = $(this).attr("src").replace("100/60", "400/250");

        $("#main").fadeOut(200, function(){
            $(this).attr("src", newSrc).fadeIn(200);
        });

    });
});
</script>

</body>
</html>
