<!DOCTYPE html>
<html>
<head>
<style>

header {
    position: fixed;
    top: 0;
    width: 100%;
    background: black;
    color: white;
    text-align: center;
    padding: 10px;
    z-index: 100;
}

.box {
    height: 200px;
    margin-top: 60px;
}

.red { background: red; z-index: 1; position: relative; }
.green { background: green; z-index: 2; position: relative; }
.blue { background: blue; z-index: 3; position: relative; }

</style>
</head>
<body>

<header>Fixed Header</header>

<div class="box red"></div>
<div class="box green"></div>
<div class="box blue"></div>

</body>
</html>
