<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div id="navbar"></div>

<h1>Contact Us</h1>

<div class="layout">

    <!-- HEADER / LOGO -->
    <div class="content">
        <img src="images/vitfull.png" alt="VIT Logo" class="contact-logo">
    </div>

    <!-- CONTACT INFO -->
    <div class="content contact-section">

        <h2>Admissions are Open</h2>
        <h3>Get in touch with us</h3>

        <!-- ADDRESS -->
        <div class="contact-box">
            <div class="map-container">
                <a href="https://www.google.com/maps/place/Vellore+Institute+of+Technology" target="_blank">
                    <img src="images/vit.jpg" alt="Map" class="map-img">
                </a>
                <p class="map-text"><u>Click image to open Google Maps</u></p>
            </div>

            <div class="address-text">
                <p>
                    VIT University,<br>
                    Vellore,<br>
                    Tamil Nadu,<br>
                    India.
                </p>
            </div>
        </div>

        <!-- PHONE -->
        <div class="contact-box">
            <img src="images/phone.jpg" class="icon float-icon">
            <p class="float-text">+91 XXXXX XXXXX</p>
        </div>

        <!-- EMAIL -->
        <div class="contact-box">
            <img src="images/email.png" class="icon float-icon">
            <p class="float-text">student@vit.ac.in</p>
        </div>

    </div>

</div>

<div class="footer">
    <p>VIT University</p>
    <p>Contact Page</p>
    <p>© 2025 All Rights Reserved</p>
</div>

<script src="js/components.js"></script>

</body>
</html>
